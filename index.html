<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ishaan — Blockmango</title>
  <link rel="icon" href="Fivcon.jpg" type="image/jpg">

  <!-- Open Graph -->
  <meta property="og:title" content="Ishaan-Blockmango" />
  <meta property="og:description" content="Ishaan Blockmango official Website." />
  <meta property="og:image" content="https://yt3.googleusercontent.com/sgMNqWe3c2QtjoKv2_Ifr_TSbIfd3YgqXLkFBNz_SUWZrK5mYj1PYI79HzAPNTpJCoizr_91Lg=s160-c-k-c0x00ffffff-no-rj" />
  <meta property="og:url" content="https://ishaan50.github.io/Ishaan/" />
  <meta property="og:type" content="website" />

  <!-- Google font (only one external resource) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-img: url('https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1400&q=60');
      --glass: rgba(255,255,255,0.06);
      --glass-2: rgba(255,255,255,0.85);
      --accent: #FF3B30;         /* youtube red / accent */
      --accent-2: #5865F2;       /* discord */
      --muted: #9aa0a6;
      --card: rgba(255,255,255,0.06);
      --radius: 14px;
      color-scheme: light;
    }

    /* Reset & base */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, rgba(5,6,10,0.9), rgba(5,6,10,0.75)), var(--bg-img) fixed center/cover no-repeat;
      color: #e9eef6;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      line-height:1.45;
      padding-bottom:120px; /* room for footer */
    }

    /* Page container */
    .container{
      max-width:1200px;
      margin: 1.25rem auto;
      padding: 1rem;
      width: calc(100% - 2rem);
    }

    /* Top nav */
    .topbar{
      position: sticky;
      top: 12px;
      z-index:999;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 1rem;
      padding: 10px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px) saturate(1.05);
      border: 1px solid rgba(255,255,255,0.04);
    }

    .brand{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .brand img{
      width:48px;height:48px;border-radius:12px;object-fit:cover;
      box-shadow: 0 6px 18px rgba(0,0,0,0.6), inset 0 -2px 6px rgba(0,0,0,0.25);
      transform: rotate(-8deg);
    }

    .brand .title{
      font-weight:800;
      letter-spacing: -0.02em;
      font-size:1.05rem;
      color: white;
    }

    nav.primary{
      display:flex;
      gap:0.75rem;
      align-items:center;
    }
    nav.primary a{
      color:var(--muted);
      text-decoration:none;
      padding:8px 12px;
      border-radius:10px;
      font-weight:600;
      transition: all .18s ease;
    }
    nav.primary a:hover{ color: white; background: rgba(255,255,255,0.04); transform:translateY(-2px) }

    .actions{ display:flex; gap:10px; align-items:center; }

    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      color: white;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 8px 12px;
      border-radius: 10px;
      cursor:pointer;
      font-weight:700;
      text-decoration:none;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .btn:active{ transform: translateY(1px) }
    .btn--accent{ background: linear-gradient(90deg, var(--accent), #ff6b50); box-shadow: 0 6px 30px rgba(255,80,70,0.12); }
    .btn--discord{ background: linear-gradient(90deg, var(--accent-2), #4c63d6); box-shadow: 0 6px 30px rgba(80,100,230,0.08); }

    /* Hero */
    .hero{
      margin-top:1rem;
      display:grid;
      grid-template-columns: 1fr 420px;
      gap:24px;
      align-items:stretch;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border-radius: var(--radius);
      padding:22px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 10px 30px rgba(3,6,12,0.6);
    }

    .hero-left h1{
      margin:0 0 10px 0;
      font-size:2.2rem;
      color:white;
      letter-spacing:-0.02em;
    }
    .hero-left p.lead{
      margin:0 0 18px 0;
      color:var(--muted);
      font-weight:500;
    }

    /* quick stats */
    .stats{
      display:flex;
      gap:12px;
      margin-top:14px;
      flex-wrap:wrap;
    }
    .stat{
      min-width:120px;
      flex:1;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      padding:12px;
      border-radius:12px;
      text-align:center;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .stat strong{display:block;font-size:1.35rem; color:white}
    .stat span{display:block;color:var(--muted); font-size:0.9rem; margin-top:6px}

    /* Logo / avatar column */
    .hero-right{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:12px;
    }
    .avatar {
      width:220px;height:220px;border-radius:20px;overflow:hidden;
      border: 4px solid rgba(255,255,255,0.06);
      box-shadow: 0 20px 60px rgba(0,0,0,0.65), 0 4px 14px rgba(0,0,0,0.4);
      background:linear-gradient(135deg, rgba(255,255,255,0.03), rgba(0,0,0,0.15));
      display:flex;align-items:center;justify-content:center;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;transform: rotate(3deg)}

    .subscribe-row{ display:flex; gap:10px; width:100%; justify-content:center; margin-top:8px }
    .subscribe-row .btn { padding:10px 16px; font-weight:800 }

    /* Sections grid for the rest */
    .grid{
      margin-top:22px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:18px;
    }

    /* Video carousel card */
    .video-card h2{
      margin:0 0 10px 0;
      font-size:1.25rem;
      color:white;
    }
    .carousel{
      display:flex;
      gap:12px;
      overflow-x:auto;
      padding:10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling:touch;
    }
    .carousel .thumb{
      min-width:260px;
      height:150px;
      border-radius:12px;
      overflow:hidden;
      flex-shrink:0;
      background:#000;
      position:relative;
      scroll-snap-align:start;
      box-shadow: 0 10px 30px rgba(2,6,12,0.6);
      cursor:pointer;
      border:1px solid rgba(255,255,255,0.03);
      transform: translateZ(0);
      transition: transform .18s ease;
    }
    .carousel .thumb:hover{ transform: translateY(-6px) scale(1.02) }
    .thumb img{ width:100%; height:100%; object-fit:cover; display:block }
    .thumb .label{
      position:absolute;left:10px;bottom:10px;
      background:rgba(0,0,0,0.5);
      padding:6px 8px;border-radius:8px;font-weight:700;font-size:0.9rem;color:#fff;
    }
    .carousel::-webkit-scrollbar{ display:none }

    /* Discord card */
    .discord-card iframe{
      width:100%;
      height:380px;
      border-radius:10px;
      border:none;
      display:block;
    }

    /* Blockmango / video */
    .video-responsive{
      width:100%;
      max-width:420px;
      margin:0 auto;
      border-radius:12px;
      overflow:hidden;
      box-shadow: 0 18px 50px rgba(0,0,0,0.6);
      border:1px solid rgba(255,255,255,0.04);
    }
    .video-responsive video{
      width:100%;height:auto;display:block;background:#000;
    }

    /* Symbol / copy */
    .symbol{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      flex-direction:column;
      padding:24px;
    }
    .symbol .symbol-box{
      font-size:2.2rem;
      background: linear-gradient(180deg,#fff 3%, rgba(255,255,255,0.06) 30%);
      color:#0a0a0a;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      user-select:none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      border:1px solid rgba(0,0,0,0.06);
    }
    .hint{ color:var(--muted); font-size:0.95rem; margin-top:6px }

    /* Footer */
    footer.site-footer{
      position:fixed;
      left:0;right:0;bottom:0;
      display:flex;align-items:center;justify-content:center;
      padding:14px 16px;background:linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.6));
      color:var(--muted); font-size:0.93rem;
      border-top:1px solid rgba(255,255,255,0.02);
      z-index:999;
    }

    /* modal (lightbox) */
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:1200;
    }
    .modal{
      width: min(900px, 95%);
      border-radius:10px;
      overflow:hidden;
      background: #000;
      box-shadow:0 30px 80px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.03);
    }
    .modal iframe, .modal video{
      width:100%;height:520px;border: none;background:#000;display:block;
    }
    .modal .close{
      position:absolute;right:18px;top:12px;background:rgba(255,255,255,0.06);border:none;color:white;padding:8px 10px;border-radius:8px;cursor:pointer;
    }

    /* Responsive */
    @media (max-width: 1000px){
      .hero{ grid-template-columns: 1fr; }
      .grid{ grid-template-columns: repeat(2,1fr) }
      .carousel .thumb{ min-width:220px }
    }
    @media (max-width:680px){
      nav.primary{ display:none } /* hide nav on very small */
      .grid{ grid-template-columns: 1fr }
      .carousel .thumb{ min-width:180px; height:120px }
      .modal iframe, .modal video{ height:320px }
      .hero-left h1{ font-size:1.5rem }
    }

    /* small micro-animations */
    .pulse {
      animation: pulse 2.4s infinite;
      box-shadow: 0 8px 28px rgba(255,59,48,0.12);
    }
    @keyframes pulse {
      0% { transform: translateY(0) scale(1) }
      50% { transform: translateY(-4px) scale(1.01) }
      100% { transform: translateY(0) scale(1) }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar" role="banner" aria-label="Top navigation">
      <div class="brand" title="Ishaan - Blockmango">
        <img src="https://yt3.googleusercontent.com/sgMNqWe3c2QtjoKv2_Ifr_TSbIfd3YgqXLkFBNz_SUWZrK5mYj1PYI79HzAPNTpJCoizr_91Lg=s160-c-k-c0x00ffffff-no-rj" alt="Ishaan logo" />
        <div>
          <div class="title">Ishaan — Blockmango</div>
          <div style="font-size:12px;color:var(--muted)">Gaming • Videos • Community</div>
        </div>
      </div>

      <nav class="primary" role="navigation" aria-label="Primary">
        <a href="#videos">Videos</a>
        <a href="#discord">Discord</a>
        <a href="#symbol">Symbol</a>
        <a href="#blockmango">Blockman GO</a>
      </nav>

      <div class="actions">
        <a class="btn btn--accent" href="https://www.youtube.com/@Ishaan-Blockmango" target="_blank" rel="noopener">🎥 Subscribe</a>
        <button class="btn btn--discord" id="join-discord">💬 Join</button>
      </div>
    </header>
</body>
</html>
